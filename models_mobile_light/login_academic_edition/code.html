<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Abstract background elements to reinforce the light/minimalist academic theme -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
<div class="absolute -bottom-40 -left-40 w-[500px] h-[500px] bg-secondary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
</div>
<div class="w-full max-w-[440px]">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-outline-variant/30 p-8">
<!-- Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-low mb-4 border border-outline-variant/50">
<span aria-hidden="true" class="material-symbols-outlined text-primary text-3xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Welcome to AcadeRAG</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your research and projects.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 bg-[#f1f5f9] border-transparent rounded-lg focus:bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface py-3 transition-colors duration-200" id="email" name="email" placeholder="researcher@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 bg-[#f1f5f9] border-transparent rounded-lg focus:bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-body-md text-on-surface py-3 transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span aria-hidden="true" class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-[#f1f5f9]" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                        Sign in
                    </button>
</div>
</form>
<!-- Divider -->
<div class="mt-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">
                            Or continue with
                        </span>
</div>
</div>
</div>

                    Google
                </button>
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-outline-variant/50 rounded-lg bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low hover:border-outline-variant transition-colors duration-200 shadow-[0px_1px_2px_rgba(0,0,0,0.02)]" type="button">

                </button>

            Don't have an account?

<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 2px var(--tw-colors-primary);
            border-color: var(--tw-colors-primary);
        }
        
        .role-toggle {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="w-full top-0 bg-background/80 backdrop-blur-xl z-50">
<div class="flex items-center justify-between px-gutter py-md w-full max-w-container-max mx-auto h-20">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform">arrow_back</span>
<span class="font-label-md text-label-md">Volver</span>
</button>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-display text-headline-md font-bold text-primary tracking-tight">AcadeRAG</span>
</div>
<div class="w-20 md:w-24"></div> <!-- Spacer for balance -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden py-12">
<!-- Abstract Background Elements -->
<div class="absolute top-0 right-0 w-[800px] h-[800px] bg-primary-fixed/30 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 opacity-60 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-surface-container-high/50 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4 opacity-60 pointer-events-none"></div>
<!-- Registration Card -->
<div class="relative z-10 w-full max-w-lg">
<div class="bg-surface-container-lowest rounded-2xl shadow-[0_8px_24px_rgba(0,0,0,0.04)] border border-outline-variant/20 p-8 relative overflow-hidden">
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2 tracking-tight">
            Únete a la Revolución RAG
          </h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tu conocimiento, amplificado por IA.</p>
</div>
<!-- Role Selector -->
<div class="flex p-2 bg-surface-container rounded-xl mb-8">
<button class="role-toggle active flex-1 py-2 rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 bg-primary text-on-primary shadow-sm" id="btnStudent" onclick="setRole('student')">
<span class="material-symbols-outlined text-[18px]">person</span>
            Soy Estudiante
          </button>
<button class="role-toggle flex-1 py-2 rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 text-on-surface-variant hover:text-on-surface" id="btnTeacher" onclick="setRole('teacher')">
<span class="material-symbols-outlined text-[18px]">school</span>
            Soy Profesor
          </button>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Nombre Completo</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">person_outline</span>
<input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg py-3 pl-11 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline/70 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" placeholder="Ej: Julian Casablancas" type="text">
</div>
</div>
<!-- University Email -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Email Universitario</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">alternate_email</span>
<input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg py-3 pl-11 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline/70 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" placeholder="julian@uni.edu" type="email">
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Contraseña</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg py-3 pl-11 pr-11 font-body-md text-body-md text-on-surface placeholder:text-outline/70 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-2 px-1 pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-bright cursor-pointer" type="checkbox">
</div>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-tight">
              Acepto los <a class="text-primary hover:underline" href="#">Términos de Servicio</a> y la <a class="text-primary hover:underline" href="#">Política de Privacidad</a>.
            </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 px-4 rounded-lg hover:bg-primary/90 hover:shadow-[0_10px_25px_rgba(0,0,0,0.08)] transition-all duration-200 mt-6 active:scale-95" type="submit">
<span>Crear Cuenta</span>
</button>
</form>
<div class="mt-8 text-center pt-6 border-t border-outline-variant/20">
<p class="font-body-md text-body-md text-on-surface-variant">
            ¿Ya tienes cuenta? 
            <a class="text-primary font-semibold hover:underline transition-all" href="#">iniciar sesión</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full bottom-0 bg-transparent border-t border-outline-variant/20 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-gutter py-8 w-full max-w-container-max mx-auto gap-4">
<div class="flex flex-col items-center md:items-start gap-2">
<div class="font-display text-label-md font-bold text-primary">AcadeRAG</div>
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-80">© 2024 AcadeRAG. Empowering deep focus.</p>
</div>
<div class="flex gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors opacity-80 hover:opacity-100" href="#">TOS</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors opacity-80 hover:opacity-100" href="#">Privacy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors opacity-80 hover:opacity-100" href="#">Support</a>
</div>
</div>
</footer>
<script>
    function setRole(role) {
      const studentBtn = document.getElementById('btnStudent');
      const teacherBtn = document.getElementById('btnTeacher');
      
      const activeClasses = ['bg-primary', 'text-on-primary', 'shadow-sm'];
      const inactiveClasses = ['text-on-surface-variant', 'hover:text-on-surface'];
      
      if (role === 'student') {
        studentBtn.classList.add(...activeClasses);
        studentBtn.classList.remove(...inactiveClasses);
        
        teacherBtn.classList.remove(...activeClasses);
        teacherBtn.classList.add(...inactiveClasses);
      } else {
        teacherBtn.classList.add(...activeClasses);
        teacherBtn.classList.remove(...inactiveClasses);
        
        studentBtn.classList.remove(...activeClasses);
        studentBtn.classList.add(...inactiveClasses);
      }
    }
  </script>
</body></html>

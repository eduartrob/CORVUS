<style>

        .otp-input::-webkit-inner-spin-button {
            -webkit-appearance: none;

        }

        }

            box-shadow: 0 0 15px rgba(0, 40, 142, 0.15);

<body class="min-h-screen flex flex-col font-body-md text-on-surface bg-background">
<!-- Decorative background elements -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-surface-container-high to-transparent opacity-50"></div>
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-fixed-dim rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-pulse"></div>
<div class="absolute -bottom-40 -left-40 w-96 h-96 bg-secondary-fixed-dim rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
</div>
<header class="relative z-10 w-full top-0 bg-background/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-gutter py-6 w-full max-w-container-max mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-headline-md" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-headline-lg-mobile md:font-headline-lg text-primary tracking-tight">AcadeRAG</span>
</div>
</div>
</header>
<main class="flex-grow relative z-10 flex items-center justify-center px-gutter py-8">
<div class="bg-surface-container-lowest w-full max-w-md p-8 rounded-2xl border border-outline-variant/30 text-center shadow-[0px_10px_25px_rgba(0,0,0,0.08)] relative">
<div class="absolute -top-3 -right-3 w-6 h-6 bg-secondary-container rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-[14px] text-on-secondary-container">shield</span>
</div>
<div class="mb-8 inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-low text-primary floating">
<span class="material-symbols-outlined text-[32px]">lock_person</span>
</div>
<h1 class="font-title-lg text-title-lg text-on-surface mb-2">Verificación de Identidad</h1>
<p class="font-body-md text-on-surface-variant mb-8">
                Hemos enviado un código de 6 dígitos a su correo institucional.<br>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-2 font-mono bg-surface-container inline-block px-2 py-1 rounded">usuario@universidad.edu</span>
</p>
<form class="space-y-6" id="otp-form">
<div class="flex gap-2 max-w-full mx-auto flex-nowrap justify-center overflow-x-auto pb-2 px-1">
<input autofocus="" class="otp-input h-14 md:w-14 md:h-16 bg-surface-container-low border border-outline-variant rounded-xl text-center font-display-lg text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all w-12 flex-shrink-0" maxlength="1" pattern="\d*" required="" type="number">
<input class="otp-input h-14 md:w-14 md:h-16 bg-surface-container-low border border-outline-variant rounded-xl text-center font-display-lg text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all w-12 flex-shrink-0" maxlength="1" pattern="\d*" required="" type="number">
<input class="otp-input h-14 md:w-14 md:h-16 bg-surface-container-low border border-outline-variant rounded-xl text-center font-display-lg text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all w-12 flex-shrink-0" maxlength="1" pattern="\d*" required="" type="number">
<input class="otp-input h-14 md:w-14 md:h-16 bg-surface-container-low border border-outline-variant rounded-xl text-center font-display-lg text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all w-12 flex-shrink-0" maxlength="1" pattern="\d*" required="" type="number">
<input class="otp-input h-14 md:w-14 md:h-16 bg-surface-container-low border border-outline-variant rounded-xl text-center font-display-lg text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all w-12 flex-shrink-0" maxlength="1" pattern="\d*" required="" type="number">
<input class="otp-input h-14 md:w-14 md:h-16 bg-surface-container-low border border-outline-variant rounded-xl text-center font-display-lg text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition-all w-12 flex-shrink-0" maxlength="1" pattern="\d*" required="" type="number">
</div>
<div class="pt-2">
<button class="w-full py-3 px-8 bg-primary-container text-on-primary-container font-label-md text-label-md rounded-lg hover:bg-primary hover:text-on-primary transition-colors duration-200 group flex items-center justify-center gap-2" type="submit">
<span>Verificar Acceso</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-6 text-center">
<p class="font-body-md text-body-md text-on-surface-variant flex items-center justify-center gap-1 mb-2">
                    ¿No recibió el código?
                </p>
<p class="font-label-md text-label-md text-on-surface-variant hidden" id="countdown-text">
                    Reenviar código en <span class="font-mono text-primary font-semibold w-10 inline-block text-left" id="timer">00:30</span>
</p>
<button class="font-label-md text-label-md text-primary hover:underline transition-all flex items-center justify-center gap-1 mx-auto" id="resend-btn">
<span class="material-symbols-outlined text-[16px]">refresh</span>
                    Reenviar código en <span class="font-mono w-10 inline-block text-left" id="btn-timer">00:30</span>
</button>

<footer class="relative z-10 w-full bottom-0 border-t border-outline-variant/20 bg-background/80 backdrop-blur-xl">
<div class="flex flex-col md:flex-row justify-between items-center px-gutter py-6 w-full max-w-container-max mx-auto gap-4">
<div class="font-label-md text-label-md font-bold text-primary">© 2024 AcadeRAG. Empowering deep focus.</div>
<div class="flex gap-4 font-label-sm text-label-sm text-on-surface-variant">
<a class="hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]">help</span>
                    Contactar Soporte Técnico
                </a>
</div>
</div>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const form = document.getElementById('otp-form');
            const resendBtn = document.getElementById('resend-btn');
            const btnTimerSpan = document.getElementById('btn-timer');
            
            // Focus first input on load
            inputs[0].focus();

            // OTP Input Logic
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    const val = e.target.value;
                    
                    // Clear non-numeric
                    if (/[^0-9]/.test(val)) {
                        e.target.value = val.replace(/[^0-9]/g, '');
                        return;
                    }

                    // Move to next
                    if (val.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    
                    updateInputStyles();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace') {
                        if (input.value === '') {
                            if (index > 0) {
                                inputs[index - 1].focus();
                            }
                        } else {
                            input.value = '';
                        }
                        updateInputStyles();
                    }
                });

                // Handle Paste
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').slice(0, inputs.length).replace(/[^0-9]/g, '');
                    
                    if (pastedData) {
                        pastedData.split('').forEach((char, i) => {
                            if (i < inputs.length) {
                                inputs[i].value = char;
                                if (i < inputs.length - 1) {
                                    inputs[i+1].focus();
                                } else {
                                    inputs[i].focus();
                                }
                            }
                        });
                        updateInputStyles();
                    }
                });
            });

            function updateInputStyles() {
                inputs.forEach(inp => {
                    if (inp.value) {
                        inp.classList.add('border-primary', 'bg-surface-container-highest');
                        inp.classList.remove('border-outline-variant', 'bg-surface-container-low');
                    } else {
                        inp.classList.remove('border-primary', 'bg-surface-container-highest');
                        inp.classList.add('border-outline-variant', 'bg-surface-container-low');
                    }
                });
            }

            // Form Submit Simulation
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const code = Array.from(inputs).map(i => i.value).join('');
                if (code.length === 6) {
                    const btn = form.querySelector('button[type="submit"]');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Verificando...</span>';
                    btn.classList.add('opacity-80', 'pointer-events-none');
                    
                    setTimeout(() => {
                        // Success state visual feedback
                        btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Verificado</span>';
                        btn.classList.remove('bg-primary-container', 'text-on-primary-container');
                        btn.classList.add('bg-secondary-container', 'text-on-secondary-container');
                        
                        setTimeout(() => {
                            // Reset for demo purposes
                            btn.innerHTML = originalText;
                            btn.classList.add('bg-primary-container', 'text-on-primary-container');
                            btn.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'opacity-80', 'pointer-events-none');
                            inputs.forEach((i, idx) => {
                                i.value = '';
                            });
                            inputs[0].focus();
                            updateInputStyles();
                        }, 2000);
                    }, 1500);
                }
            });

            // Resend Timer Logic
            let timeLeft = 30;
            resendBtn.disabled = true;
            resendBtn.classList.add('opacity-50', 'cursor-not-allowed', 'hover:no-underline');
            
            let timerId = setInterval(() => {
                timeLeft--;
                const seconds = timeLeft.toString().padStart(2, '0');
                btnTimerSpan.textContent = `00:${seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'hover:no-underline');
                    resendBtn.innerHTML = '<span class="material-symbols-outlined text-[16px]">send</span> Reenviar código ahora';
                }
            }, 1000);
            
            resendBtn.addEventListener('click', () => {
                if(resendBtn.disabled) return;
                
                resendBtn.disabled = true;
                resendBtn.classList.add('opacity-50', 'cursor-not-allowed', 'hover:no-underline');
                resendBtn.innerHTML = '<span class="material-symbols-outlined text-[16px]">mark_email_read</span> Enviado';
                
                // Reset inputs
                inputs.forEach((i, idx) => {
                    i.value = '';
                });
                inputs[0].focus();
                updateInputStyles();
            });
        });
    </script>
</body></html>

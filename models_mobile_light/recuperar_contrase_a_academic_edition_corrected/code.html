<script>
        // Subtle Mouse parallax for the cards
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            const { clientX, clientY } = e;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            cards.forEach(card => {
                const ratioX = (clientX - centerX) / centerX;
                const ratioY = (clientY - centerY) / centerY;
                
                card.style.transform = `perspective(1000px) rotateX(${ratioY * 2}deg) rotateY(${ratioX * 2}deg)`;
            });
        });
    </script>

<style>
    body {
      background-color: #0b1326;
      color: #dae2fd;
    }

    .glass-card {
      background: rgba(23, 31, 51, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(144, 143, 160, 0.2);
    }

    .glow-primary:focus-within {
      box-shadow: 0 0 15px rgba(192, 193, 255, 0.2);
    }

    .gradient-btn {
      background: linear-gradient(135deg, #8083ff 0%, #6f00be 100%);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .gradient-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -10px rgba(111, 0, 190, 0.5);
    }

    .shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255, 255, 255, 0.1),
        transparent
      );
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      100% { left: 200%; }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .role-toggle {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .role-toggle.active {
      background: #8083ff;
      color: #0d0096;
    }
  </style>

<body class="min-h-screen overflow-x-hidden flex flex-col font-body-md">
<header class="w-full top-0 bg-background/80 backdrop-blur-xl z-50">
<div class="flex items-center justify-between px-gutter py-md w-full max-w-container-max mx-auto">
<button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform">arrow_back</span>
<span class="font-label-md text-label-md">Volver</span>
</button>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-headline-md" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-display text-headline-md font-bold text-primary tracking-tight">AcadeRAG</span>
</div>
<div class="w-12 md:w-24"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="flex-grow flex items-center justify-center relative px-sm py-xl">
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<img alt="" class="w-full h-full object-cover mix-blend-screen overflow-hidden" data-alt="An abstract visualization of a neural network with glowing polyhedral nodes in shades of purple and indigo, interconnected by vibrant light waves on a dark, deep slate background. The aesthetic is futuristic and educational, suggesting high-dimensional data processing and deep focus. Subtle hexagonal patterns and floating wireframe geometries create a sense of digital depth and sophistication." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUdKuxxjkpdXit8VV6tJ0nHKBM4Rk8BD-uNJpYVfWKqr7i2M8ZdC4Ib7woIbbJZLPrLPTY6mBqMtxuE4JYI0Gy__rYds4ZM3GBweyZUEageda8_GBOR_1K-UbIcGIaPVIJFsI3FoYYD3_Q5Ou3QiqlgZlL9c5nMBkv51WcdLjBQo50R55IxFYrIqLhutQSiANuq2FrTXw6WzyP2n3q0rjhznwrLBIxh_SkqhmIoJsH44v0XKXdKENEoy-uX8_9NossNATYaGFpcRk"/>
</div>
<div class="relative z-10 w-full max-w-lg">
<div class="glass-card rounded-2xl p-lg md:p-xl shadow-2xl overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs tracking-tight">
            Únete a la Revolución RAG
          </h1>
<p class="font-body-md text-on-surface-variant">Tu conocimiento, amplificado por IA.</p>
</div>
<div class="flex p-base bg-surface-container rounded-xl mb-lg">
<button class="role-toggle active flex-1 py-xs rounded-lg font-label-md text-label-md flex items-center justify-center gap-xs" id="btnStudent" onclick="setRole('student')">
<span class="material-symbols-outlined text-[18px]">person</span>
            Soy Estudiante
          </button>
<button class="role-toggle flex-1 py-xs rounded-lg font-label-md text-label-md flex items-center justify-center gap-xs text-on-surface-variant hover:text-on-surface" id="btnTeacher" onclick="setRole('teacher')">
<span class="material-symbols-outlined text-[18px]">school</span>
            Soy Profesor
          </button>
</div>
<form class="space-y-md" onsubmit="return false;">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-base">Nombre Completo</label>
<div class="relative group glow-primary">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">person_outline</span>
<input class="w-full bg-surface-container border border-outline-variant/30 rounded-xl py-sm pl-xl pr-sm text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-all outline-none" placeholder="Ej: Julian Casablancas" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-base">Email Universitario</label>
<div class="relative group glow-primary">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">alternate_email</span>
<input class="w-full bg-surface-container border border-outline-variant/30 rounded-xl py-sm pl-xl pr-sm text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-all outline-none" placeholder="julian@uni.edu" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant px-base">Contraseña</label>
<div class="relative group glow-primary">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container border border-outline-variant/30 rounded-xl py-sm pl-xl pr-xl text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-start gap-xs px-base pt-xs">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant bg-surface-container-high text-primary focus:ring-offset-background focus:ring-primary" type="checkbox"/>
</div>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-tight">
              Acepto los <a class="text-primary hover:underline" href="#">Términos de Servicio</a> y la <a class="text-primary hover:underline" href="#">Política de Privacidad</a>.
            </label>
</div>
<button class="gradient-btn w-full py-md rounded-xl font-headline-md text-on-primary-container relative overflow-hidden group">
<span class="relative z-10">Crear Cuenta</span>
<div class="shimmer"></div>
</button>
</form>
<div class="mt-lg text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
            ¿Ya tienes cuenta? 
            <a class="text-primary font-semibold hover:text-secondary transition-colors underline-offset-4 hover:underline" href="#">iniciar sesión</a>
</p>
</div>
</div>
</div>

<footer class="w-full mt-auto border-t border-outline-variant/20">
<div class="flex flex-col md:flex-row justify-between items-center px-gutter py-lg w-full max-w-container-max mx-auto gap-md">
<div class="flex flex-col items-center md:items-start gap-base">
<div class="font-display text-label-md font-bold text-primary">AcadeRAG</div>
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-80">© 2024 AcadeRAG. Empowering deep focus.</p>
</div>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">TOS</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Support</a>
</div>
</div>
</footer>
<script>
    function setRole(role) {
      const studentBtn = document.getElementById('btnStudent');
      const teacherBtn = document.getElementById('btnTeacher');
      
      if (role === 'student') {
        studentBtn.classList.add('active');
        studentBtn.classList.remove('text-on-surface-variant');
        
        teacherBtn.classList.remove('active');
        teacherBtn.classList.add('text-on-surface-variant');
      } else {
        teacherBtn.classList.add('active');
        teacherBtn.classList.remove('text-on-surface-variant');
        
        studentBtn.classList.remove('active');
        studentBtn.classList.add('text-on-surface-variant');
      }
    }

    // Subtle parallax effect on mouse move
    document.addEventListener('mousemove', (e) => {
      const amount = 20;
      const x = (e.clientX / window.innerWidth - 0.5) * amount;
      const y = (e.clientY / window.innerHeight - 0.5) * amount;
      const img = document.querySelector('img');
      if (img) {
        img.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        img.style.transition = 'transform 0.2s ease-out';
      }
    });
  </script>
</body></html>
